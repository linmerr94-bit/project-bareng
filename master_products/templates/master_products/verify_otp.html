{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi OTP - VOLTA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
        
        <div class="text-center mb-8">
            <div class="text-4xl mb-4">🔐</div>
            <h1 class="text-2xl font-bold text-white">Verifikasi OTP</h1>
            <p class="text-gray-400 mt-2">Masukkan kode OTP yang dikirim ke email Anda</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="bg-red-500/20 border border-red-500 text-red-400 rounded-lg p-3 mb-4 text-sm">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-6">
                <input 
                    type="text" 
                    name="otp" 
                    placeholder="Masukkan 6 digit OTP"
                    maxlength="6"
                    autofocus
                    class="w-full bg-gray-700 text-white text-center text-2xl font-bold tracking-widest rounded-xl px-4 py-4 border border-gray-600 focus:border-blue-500 focus:outline-none"
                >
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">
                Verifikasi
            </button>
        </form>

        <p class="text-center text-gray-500 text-sm mt-6">
            Tidak menerima kode? Coba login ulang.
        </p>
    </div>
</body>
</html>
